<!doctype html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <style>
      body { margin:0; font-family:Arial,sans-serif; background:#f6f8fc; color:#1f2937; }
      .wrap { max-width:520px; margin:32px auto; padding:0 20px; }
      .card { background:white; border:1px solid #e5e7eb; border-radius:16px; padding:24px; }
      h1 { font-size:22px; font-weight:700; margin:0 0 20px; }
      .form-group { margin-bottom:14px; }
      label { display:block; font-size:13px; font-weight:600; color:#6b7280; margin-bottom:4px; }
      input, select { width:100%; padding:9px 10px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; box-sizing:border-box; }
      input:focus, select:focus { outline:none; border-color:#1a73e8; }
      button[type="submit"] { background:#1a73e8; color:white; padding:10px 20px; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; width:100%; margin-top:4px; }
      button[type="submit"]:hover:not(:disabled) { background:#1557b0; }
      button[type="submit"]:disabled { background:#9ca3af; cursor:not-allowed; }
      .status { margin-top:14px; padding:10px 14px; border-radius:10px; font-size:14px; display:none; }
      .status.success { background:#ecfdf5; border:1px solid #6ee7b7; color:#065f46; display:block; }
      .status.error { background:#fef2f2; border:1px solid #fca5a5; color:#991b1b; display:block; }
      .btn { display:inline-block; text-decoration:none; padding:8px 14px; border-radius:10px; background:#1a73e8; color:white; font-weight:600; font-size:13px; margin-top:8px; }
      .info { font-size:13px; color:#6b7280; margin-bottom:16px; padding:8px 12px; background:#eff6ff; border-left:3px solid #1a73e8; border-radius:0 6px 6px 0; }
      .warning-box { padding:12px; background:#fef3cd; border:1px solid #ffc107; border-radius:8px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>New Client</h1>
        <div id="sourceInfo" class="info" style="display:none;"></div>
        <form id="newClientForm">
          <div class="form-group">
            <label>Full Name</label>
            <input name="FULL_NAME" required>
          </div>
          <div class="form-group">
            <label>ID Type</label>
            <select name="ID_TYPE">
              <option value="">-- Select ID Type --</option>
              <option value="TZ">TZ</option>
              <option value="Passport">Passport</option>
              <option value="Darkon">Darkon</option>
              <option value="Teudat Zehut">Teudat Zehut</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>ID Number</label>
            <input name="ID_NUMBER">
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input name="PHONE">
          </div>
          <div class="form-group">
            <label>Address</label>
            <input name="ADDRESS">
          </div>
          <div class="form-group">
            <button type="submit" id="newClientSubmit">Create Client</button>
          </div>
        </form>
        <div id="newClientStatus" class="status"></div>
      </div>
    </div>

    <script>
      const WEB_APP_BASE = "<?= webAppBase ?>";
      const SOURCE_ID = "<?= entityId ?>";

      function initializeForm() {
        if (!SOURCE_ID) {
          // No source, show form directly
          return;
        }

        // Check if source lead already has linked client
        google.script.run
          .withSuccessHandler(function (leadInfo) {
            if (!leadInfo.ok) {
              document.getElementById("sourceInfo").style.display = "";
              document.getElementById("sourceInfo").textContent = "Lead not found";
              return;
            }

            if (leadInfo.hasLinkedClient) {
              // Lead already linked to client - prevent duplicate
              document.getElementById("newClientForm").style.display = "none";
              const st = document.getElementById("newClientStatus");
              st.className = "status success";
              st.innerHTML =
                '<div class="warning-box"><b>This lead is already linked to a client:</b> ' + leadInfo.linkedClientId + '<br>' +
                '<a href="' + WEB_APP_BASE + '?page=client&id=' + encodeURIComponent(leadInfo.linkedClientId) + '" class="btn">Open Client</a>' +
                '</div>';
            } else {
              // Lead not linked to client - autofill form from lead data
              document.getElementById("sourceInfo").style.display = "";
              document.getElementById("sourceInfo").textContent = "Creating client from lead: " + SOURCE_ID;

              // Autofill form fields from lead data
              if (leadInfo.lead) {
                if (leadInfo.lead.FULL_NAME) {
                  document.querySelector('input[name="FULL_NAME"]').value = leadInfo.lead.FULL_NAME;
                }
                if (leadInfo.lead.PHONE) {
                  document.querySelector('input[name="PHONE"]').value = leadInfo.lead.PHONE;
                }
                if (leadInfo.lead.ID_TYPE) {
                  document.querySelector('select[name="ID_TYPE"]').value = leadInfo.lead.ID_TYPE;
                }
                if (leadInfo.lead.ID_NUMBER) {
                  document.querySelector('input[name="ID_NUMBER"]').value = leadInfo.lead.ID_NUMBER;
                }
              }
            }
          })
          .crm_webGetLeadInfo(SOURCE_ID);
      }

      // Initialize on load
      initializeForm();

      document.getElementById("newClientForm").addEventListener("submit", function (e) {
        e.preventDefault();
        const btn = document.getElementById("newClientSubmit");
        const statusEl = document.getElementById("newClientStatus");
        btn.disabled = true;
        btn.textContent = "Creating client...";
        statusEl.className = "status";
        statusEl.innerHTML = "";

        const data = {
          FULL_NAME: String(e.target.FULL_NAME.value ?? "").trim(),
          ID_TYPE: String(e.target.ID_TYPE.value ?? "").trim(),
          ID_NUMBER: String(e.target.ID_NUMBER.value ?? "").trim(),
          PHONE: String(e.target.PHONE.value ?? "").trim(),
          ADDRESS: String(e.target.ADDRESS.value ?? "").trim(),
          sourceLeadId: String(SOURCE_ID ?? "").trim()
        };

        google.script.run
          .withSuccessHandler(function (client) {
            btn.disabled = false;
            btn.textContent = "Create Client";
            const msg = client.alreadyLinked ? "Client already linked!" : "Client created!";
            statusEl.className = "status success";
            statusEl.innerHTML = msg + ' <a class="btn" href="' + WEB_APP_BASE + '?page=client&id=' + encodeURIComponent(client.id) + '">Open Client</a>';
          })
          .withFailureHandler(function (err) {
            btn.disabled = false;
            btn.textContent = "Create Client";
            statusEl.className = "status error";
            statusEl.textContent = "Error: " + (err.message || err);
          })
          .crm_webCreateClient(data);
      });
    </script>
  </body>
</html>
